name: Build Desktop Apps 
on: 
  push: 
    branches: [ main ] 
  workflow_dispatch: 
jobs: 
  windows: 
    runs-on: windows-latest 
    steps: 
      - uses: actions/checkout@v4 
      - uses: actions/setup-node@v4 
        with: 
          node-version: '22' 
      - run: npm install 
      - run: npm run build 
      - run: cd electron && npm install 
      - run: cd electron && npm run dist -- --win 
      - uses: actions/upload-artifact@v4 
        with: 
          name: CBEF-Windows 
          path: electron/release/*.exe 
 
  macos: 
    runs-on: macos-latest 
    steps: 
      - uses: actions/checkout@v4 
      - uses: actions/setup-node@v4 
        with: 
          node-version: '22' 
      - run: npm install 
      - run: npm run build 
      - run: cd electron && npm install 
      - run: cd electron && npm run dist -- --mac 
      - uses: actions/upload-artifact@v4 
        with: 
          name: CBEF-macOS 
          path: electron/release/*.dmg 
 
  linux: 
    runs-on: ubuntu-latest 
    steps: 
      - uses: actions/checkout@v4 
      - uses: actions/setup-node@v4 
        with: 
          node-version: '22' 
      - run: npm install 
      - run: npm run build 
      - run: cd electron && npm install 
      - run: cd electron && npm run dist -- --linux 
      - uses: actions/upload-artifact@v4 
        with: 
          name: CBEF-Linux 
          path: electron/release/*.AppImage 
